<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leitor de QR - Don Tasko</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
        }

        header {
            background: #1a1a1a;
            padding: 1.5rem;
            border-bottom: 2px solid #d4a574;
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            color: #d4a574;
            font-weight: 700;
        }

        .container {
            max-width: 100%;
            padding: 1rem;
        }

        .section {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #333;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.3rem;
            color: #d4a574;
            margin-bottom: 1rem;
        }

        /* CAMERA VIEW */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #canvas {
            display: none;
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid #d4a574;
            box-shadow: inset 0 0 40px rgba(212, 165, 116, 0.2);
            pointer-events: none;
        }

        .camera-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 3px dashed #d4a574;
            border-radius: 12px;
            pointer-events: none;
        }

        .scanning-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #d4a574;
            animation: scan 2s infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 50%; }
            100% { top: 100%; }
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-camera {
            background: #d4a574;
            color: #1a1a1a;
        }

        .btn-camera:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 165, 116, 0.4);
        }

        .btn-camera.active {
            background: #27ae60;
        }

        .btn-upload {
            background: transparent;
            color: #d4a574;
            border: 2px solid #d4a574;
        }

        .btn-upload:hover {
            background: rgba(212, 165, 116, 0.1);
        }

        .btn-stop {
            background: #e74c3c;
            color: white;
        }

        .btn-stop:hover {
            background: #c0392b;
        }

        .file-input {
            display: none;
        }

        .info-box {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid #3498db;
            border-radius: 8px;
            padding: 1rem;
            color: #64b5f6;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .status {
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #ff7675;
        }

        .status-success {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid #27ae60;
            color: #81c784;
        }

        .results {
            display: none;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .result-item {
            background: #1a1a1a;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #d4a574;
        }

        .result-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 1.5rem;
            color: #d4a574;
            font-weight: 700;
            word-break: break-all;
        }

        .debug-panel {
            background: #0a0a0a;
            border: 2px solid #666;
            border-radius: 8px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: #81c784;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .result-grid {
                grid-template-columns: 1fr;
            }

            .camera-container {
                height: 70vh;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🍷 Don Tasko - Leitor QR</div>
</header>

<div class="container">
    <div class="info-box">
        <strong>📱 Escaneia o QR code da fatura com a câmara</strong><br>
        ✅ Aponta a câmara para o QR code<br>
        ✅ Sistema detecta automaticamente<br>
        ✅ Dados validados em tempo real
    </div>

    <div id="errorStatus" class="status status-error"></div>
    <div id="successStatus" class="status status-success"></div>

    <!-- CAMERA VIEW -->
    <div class="section">
        <h2 class="section-title">📷 Câmara</h2>
        
        <div class="camera-container" id="cameraContainer" style="display: none;">
            <video id="video" playsinline autoplay muted></video>
            <canvas id="canvas"></canvas>
            <div class="camera-overlay">
                <div class="camera-frame">
                    <div class="scanning-line"></div>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-camera" id="btnCamera" onclick="startCamera()">📷 Abrir Câmara</button>
            <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">📁 Foto</button>
            <button class="btn btn-stop hidden" id="btnStop" onclick="stopCamera()">🛑 Parar</button>
        </div>

        <input type="file" id="fileInput" class="file-input" accept="image/*" onchange="processUploadedFile(event)">
    </div>

    <!-- RESULTADOS -->
    <div class="section results" id="resultsSection">
        <h2 class="section-title">✅ QR Detectado</h2>
        <div class="result-grid">
            <div class="result-item">
                <div class="result-label">🔢 NIF</div>
                <div class="result-value" id="resultNIF">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">💰 Valor</div>
                <div class="result-value" id="resultValor">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">📅 Data</div>
                <div class="result-value" id="resultData" style="font-size: 1rem;">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">✓ Status</div>
                <div class="result-value" style="color: #81c784; font-size: 1rem;">ACEITO</div>
            </div>
        </div>
        <button class="btn btn-camera" style="width: 100%;" onclick="copyAndReset()">📋 Copiar Dados</button>
    </div>

    <!-- DEBUG -->
    <div class="section">
        <h2 class="section-title">🐛 Debug</h2>
        <div class="debug-panel" id="debugPanel">Sistema iniciado...</div>
        <button class="btn btn-upload" style="width: 100%; margin-top: 1rem;" onclick="clearDebug()">Limpar</button>
    </div>
</div>

<!-- jsQR -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>
console.log('🎥 QR Scanner v5.0 - Live Camera');

const RESTAURANT_NIF = '516763482';
let isScanning = false;
let debugLog = [];

function log(msg) {
    const time = new Date().toLocaleTimeString('pt-PT');
    const line = `[${time}] ${msg}`;
    debugLog.push(line);
    if (debugLog.length > 15) debugLog.shift();
    updateDebugPanel();
    console.log(msg);
}

function updateDebugPanel() {
    const panel = document.getElementById('debugPanel');
    if (panel) {
        panel.textContent = debugLog.join('\n');
        panel.scrollTop = panel.scrollHeight;
    }
}

function clearDebug() {
    debugLog = [];
    updateDebugPanel();
}

function showError(msg) {
    const el = document.getElementById('errorStatus');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
}

function showSuccess(msg) {
    const el = document.getElementById('successStatus');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
}

// ========== CAMERA ==========
function startCamera() {
    log('🎥 Iniciando câmara...');
    
    const video = document.getElementById('video');
    const container = document.getElementById('cameraContainer');
    const btnCamera = document.getElementById('btnCamera');
    const btnStop = document.getElementById('btnStop');

    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
        },
        audio: false
    }).then(stream => {
        log('✅ Câmara ativada');
        video.srcObject = stream;
        container.style.display = 'block';
        btnCamera.classList.add('hidden');
        btnStop.classList.remove('hidden');
        isScanning = true;

        video.onloadedmetadata = () => {
            log('📹 Vídeo pronto');
            scanFrame();
        };

        video.play().catch(err => {
            log(`❌ Play error: ${err.message}`);
        });
    }).catch(err => {
        log(`❌ Câmara error: ${err.name}`);
        showError('❌ Câmara não disponível');
    });
}

function stopCamera() {
    log('🛑 Parando câmara');
    const video = document.getElementById('video');
    const container = document.getElementById('cameraContainer');
    const btnCamera = document.getElementById('btnCamera');
    const btnStop = document.getElementById('btnStop');

    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }

    isScanning = false;
    container.style.display = 'none';
    btnCamera.classList.remove('hidden');
    btnStop.classList.add('hidden');
}

function scanFrame() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    if (!isScanning) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        try {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && code.data) {
                log(`✅ QR: ${code.data}`);
                processQRData(code.data);
                isScanning = false;
                return;
            }
        } catch (err) {
            // Silencioso
        }
    }

    requestAnimationFrame(scanFrame);
}

// ========== UPLOAD FILE ==========
function processUploadedFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    log(`📁 Arquivo: ${file.name}`);

    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
            log(`🖼️ Processando: ${img.width}x${img.height}`);
            processUploadedImage(img);
        };
        img.onerror = () => {
            log('❌ Erro ao carregar imagem');
            showError('❌ Erro ao carregar imagem');
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

function processUploadedImage(img) {
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);

    // Tentar 3 estratégias
    let code = null;

    for (let attempt = 1; attempt <= 3; attempt++) {
        log(`Tentativa ${attempt}...`);
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        if (attempt === 2) {
            // Aumentar contraste
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i + 1] + data[i + 2]) / 3;
                const val = gray > 128 ? 255 : 0;
                data[i] = val;
                data[i + 1] = val;
                data[i + 2] = val;
            }
        } else if (attempt === 3) {
            // Inverter cores
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                data[i] = 255 - data[i];
                data[i + 1] = 255 - data[i + 1];
                data[i + 2] = 255 - data[i + 2];
            }
        }

        code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) break;
    }

    if (code && code.data) {
        log(`✅ QR encontrado: ${code.data}`);
        processQRData(code.data);
    } else {
        log('❌ Nenhum QR detectado');
        showError('❌ QR não detectado. Tira uma foto mais nítida');
    }
}

// ========== PARSE QR ==========
function processQRData(qrRawData) {
    log(`📍 Analisando: ${qrRawData}`);

    let nif = null, valor = null, data = new Date().toISOString().split('T')[0];

    if (qrRawData.includes('|')) {
        const parts = qrRawData.split('|');
        nif = parts[0].trim();
        valor = parseFloat(parts[1].trim());
        if (parts.length > 2) data = parts[2].trim();
    } else if (!isNaN(qrRawData)) {
        valor = parseFloat(qrRawData);
    } else if (/^\d{9}/.test(qrRawData)) {
        nif = qrRawData.substring(0, 9);
        const match = qrRawData.substring(9).match(/(\d+\.?\d*)/);
        if (match) valor = parseFloat(match[1]);
    } else {
        const valorMatch = qrRawData.match(/(\d+\.?\d*)/);
        if (valorMatch) valor = parseFloat(valorMatch[1]);
        const nifMatch = qrRawData.match(/\d{9}/);
        if (nifMatch) nif = nifMatch[0];
    }

    log(`NIF: ${nif} | Valor: €${valor}`);

    // Validar
    if (!nif || nif.length !== 9) {
        log('❌ NIF inválido');
        showError('❌ NIF inválido no QR');
        return;
    }

    if (!valor || valor <= 0 || valor > 500) {
        log('❌ Valor inválido');
        showError('❌ Valor inválido');
        return;
    }

    if (nif !== RESTAURANT_NIF) {
        log(`❌ NIF errado: ${nif}`);
        showError(`❌ NIF não é do Don Tasko`);
        return;
    }

    log('✅ VÁLIDO!');
    showSuccess('✅ QR Válido!');
    displayResults(nif, valor, data);
}

function displayResults(nif, valor, data) {
    document.getElementById('resultNIF').textContent = nif;
    document.getElementById('resultValor').textContent = `€${valor.toFixed(2)}`;
    document.getElementById('resultData').textContent = data;
    document.getElementById('resultsSection').style.display = 'block';
    
    window.lastQRData = `${nif}|${valor.toFixed(2)}|${data}`;
}

function copyAndReset() {
    if (window.lastQRData) {
        navigator.clipboard.writeText(window.lastQRData).then(() => {
            showSuccess('✅ Dados copiados!');
            setTimeout(() => {
                document.getElementById('resultsSection').style.display = 'none';
                window.location.reload();
            }, 1500);
        });
    }
}

log('✅ Sistema pronto (v5.0)');
</script>

</body>
</html>
