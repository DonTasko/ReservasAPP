<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HACCP Pro - Don Tasko</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #f1f5f9;
            padding: 20px;
        }

        .container { max-width: 1300px; margin: 0 auto; }

        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 24px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo p { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }

        .back-btn {
            background: rgba(51, 65, 85, 0.8);
            color: #f1f5f9;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover { background: #38bdf8; color: #0f172a; border-color: #38bdf8; transform: translateY(-2px); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.15);
            transition: all 0.2s;
        }

        .stat-card:hover { transform: translateY(-3px); border-color: #38bdf8; }
        .stat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 800; color: white; }
        .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .tabs {
            display: flex;
            gap: 0.5rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 0.5rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .tab-btn i { margin-right: 8px; }

        .tab-btn.active {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .tab-btn:hover:not(.active) { background: rgba(56, 189, 248, 0.15); color: #f1f5f9; }

        .content-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .content-card h2 { font-size: 1.4rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }

        .form-group { margin-bottom: 1.2rem; }

        .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.8rem; font-weight: 500; color: #cbd5e1; }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            color: #f1f5f9;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder { color: #475569; }

        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }

        .btn {
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); }
        .btn-secondary { background: rgba(56, 189, 248, 0.2); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
        .btn-secondary:hover { background: #38bdf8; color: #0f172a; transform: translateY(-2px); }

        .filters-card {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.15);
        }

        .filters-card h3 { margin-bottom: 1rem; font-size: 1rem; color: #cbd5e1; }

        .registos-list { margin-top: 1.5rem; }

        .registo-item {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            padding: 1.2rem;
            border-radius: 20px;
            margin-bottom: 0.8rem;
            border-left: 4px solid #38bdf8;
            transition: all 0.2s;
        }

        .registo-item:hover { background: rgba(30, 41, 59, 0.8); transform: translateX(4px); }

        .registo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .registo-tipo { font-weight: 600; color: #38bdf8; display: flex; align-items: center; gap: 6px; }
        .registo-data { color: #94a3b8; font-size: 0.8rem; }

        .alert { padding: 1rem; border-radius: 16px; margin-bottom: 1rem; }
        .alert-success { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .alert-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .alert-warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }

        .hidden { display: none !important; }
        .loading { text-align: center; padding: 2rem; color: #94a3b8; }

        #debug-banner {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 1rem;
            font-size: 13px;
            display: none;
            color: #fbbf24;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .header { flex-direction: column; text-align: center; padding: 1rem; }
            .tabs { flex-direction: column; border-radius: 20px; }
            .tab-btn { justify-content: center; }
            .form-row { grid-template-columns: 1fr; }
            .content-card { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-clipboard-list"></i> HACCP Pro</h1>
            <p>Sistema de Controlo de Segurança Alimentar</p>
        </div>
        <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar ao Painel</a>
    </div>

    <div id="statsContainer" class="stats-grid" style="display: none;"></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('temperaturas', this)"><i class="fas fa-temperature-high"></i> Temperaturas</button>
        <button class="tab-btn" onclick="switchTab('limpeza', this)"><i class="fas fa-broom"></i> Limpeza</button>
        <button class="tab-btn" onclick="switchTab('ocorrencias', this)"><i class="fas fa-exclamation-triangle"></i> Ocorrências</button>
        <button class="tab-btn" onclick="switchTab('registos', this)"><i class="fas fa-history"></i> Histórico</button>
    </div>

    <div id="alertContainer"></div>
    <div id="debug-banner"></div>

    <!-- TEMPERATURAS -->
    <div id="tab-temperaturas" class="content-card">
        <h2><i class="fas fa-thermometer-half" style="color: #38bdf8;"></i> Controlo de Temperaturas</h2>
        <form id="formTemperaturas" onsubmit="registarTemperatura(event)">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="far fa-calendar"></i> Data *</label>
                    <input type="date" id="tempData" required>
                </div>
                <div class="form-group">
                    <label><i class="far fa-clock"></i> Hora *</label>
                    <input type="time" id="tempHora" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-box"></i> Equipamento *</label>
                    <select id="tempEquipamento" required>
                        <option value="">A carregar...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-chart-line"></i> Temperatura (°C) *</label>
                    <input type="number" id="tempTemperatura" step="0.1" required placeholder="Ex: 4.5">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-chart-simple"></i> Turno *</label>
                    <select id="tempTurno" required>
                        <option value="">A carregar...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Funcionário *</label>
                    <input type="text" id="tempFuncionario" required placeholder="Nome do funcionário">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-pen"></i> Observações</label>
                <textarea id="tempObservacoes" rows="3" placeholder="Observações adicionais (opcional)"></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Registar Temperatura</button>
        </form>
    </div>

    <!-- LIMPEZA -->
    <div id="tab-limpeza" class="content-card hidden">
        <h2><i class="fas fa-soap" style="color: #38bdf8;"></i> Registo de Limpeza</h2>
        <form id="formLimpeza" onsubmit="registarLimpeza(event)">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="far fa-calendar"></i> Data *</label>
                    <input type="date" id="limpData" required>
                </div>
                <div class="form-group">
                    <label><i class="far fa-clock"></i> Hora *</label>
                    <input type="time" id="limpHora" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-location-dot"></i> Área *</label>
                    <select id="limpArea" required>
                        <option value="">A carregar...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-brush"></i> Tipo de Limpeza *</label>
                    <select id="limpTipo" required>
                        <option value="">Selecione...</option>
                        <option value="Limpeza Diária">Limpeza Diária</option>
                        <option value="Limpeza Profunda">Limpeza Profunda</option>
                        <option value="Desinfeção">Desinfeção</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-flask"></i> Produtos Utilizados *</label>
                    <input type="text" id="limpProdutos" required placeholder="Ex: Desengordurante, Detergente">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Funcionário *</label>
                    <input type="text" id="limpFuncionario" required placeholder="Nome do funcionário">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-pen"></i> Observações</label>
                <textarea id="limpObservacoes" rows="3" placeholder="Observações adicionais (opcional)"></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Registar Limpeza</button>
        </form>
    </div>

    <!-- OCORRÊNCIAS -->
    <div id="tab-ocorrencias" class="content-card hidden">
        <h2><i class="fas fa-triangle-exclamation" style="color: #f59e0b;"></i> Registo de Ocorrências</h2>
        <form id="formOcorrencia" onsubmit="registarOcorrencia(event)">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="far fa-calendar"></i> Data *</label>
                    <input type="date" id="ocorData" required>
                </div>
                <div class="form-group">
                    <label><i class="far fa-clock"></i> Hora *</label>
                    <input type="time" id="ocorHora" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Tipo de Ocorrência *</label>
                    <select id="ocorTipo" required>
                        <option value="">Selecione...</option>
                        <option value="Temperatura Fora do Normal">Temperatura Fora do Normal</option>
                        <option value="Equipamento Avariado">Equipamento Avariado</option>
                        <option value="Produto Não Conforme">Produto Não Conforme</option>
                        <option value="Contaminação">Contaminação</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Funcionário *</label>
                    <input type="text" id="ocorFuncionario" required placeholder="Nome do funcionário">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Descrição da Ocorrência *</label>
                <textarea id="ocorDescricao" rows="3" required placeholder="Descreva o que aconteceu"></textarea>
            </div>
            <div class="form-group">
                <label><i class="fas fa-bolt"></i> Ação Imediata Tomada *</label>
                <textarea id="ocorAcao" rows="3" required placeholder="Que medidas foram tomadas?"></textarea>
            </div>
            <div class="form-group">
                <label><i class="fas fa-pen"></i> Observações</label>
                <textarea id="ocorObservacoes" rows="2" placeholder="Observações adicionais (opcional)"></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Registar Ocorrência</button>
        </form>
    </div>

    <!-- REGISTOS -->
    <div id="tab-registos" class="content-card hidden">
        <h2><i class="fas fa-archive" style="color: #38bdf8;"></i> Histórico de Registos HACCP</h2>
        <div class="filters-card">
            <h3><i class="fas fa-sliders-h"></i> Filtros</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Tipo de Registo</label>
                    <select id="filtroTipo">
                        <option value="">Todos</option>
                        <option value="temperaturas">🌡️ Temperaturas</option>
                        <option value="limpeza">🧼 Limpeza</option>
                        <option value="ocorrencia">⚠️ Ocorrências</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data Início</label>
                    <input type="date" id="filtroDataInicio">
                </div>
                <div class="form-group">
                    <label>Data Fim</label>
                    <input type="date" id="filtroDataFim">
                </div>
                <div class="form-group">
                    <label>Funcionário</label>
                    <select id="filtroFuncionario"><option value="">Todos</option></select>
                </div>
            </div>
            <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap">
                <button onclick="aplicarFiltros()" class="btn btn-primary"><i class="fas fa-search"></i> Aplicar Filtros</button>
                <button onclick="limparFiltros()" class="btn btn-secondary"><i class="fas fa-undo"></i> Limpar</button>
                <button onclick="carregarRegistos()" class="btn btn-secondary"><i class="fas fa-sync-alt"></i> Atualizar</button>
            </div>
        </div>
        <div id="registosList" class="registos-list">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando registos...</div>
        </div>
    </div>

</div>

<script>
// ========== JSONP AUTÓNOMO (sem depender de config.js) ==========
const HACCP_URL = 'https://script.google.com/macros/s/AKfycbyhbzKM9rK9VeuOrOIiO_2zFA6ZZP0Kwb345o-CAecduLycSBbJFX6NEoWGnDWn-2bO/exec';

let _jsonpCounter = 0;
function haccpRequest(action, data = {}) {
    return new Promise((resolve, reject) => {
        const cb = '_hcb_' + (++_jsonpCounter);
        const params = new URLSearchParams({ action, callback: cb, ...data });
        const timeout = setTimeout(() => {
            delete window[cb];
            reject(new Error('Timeout'));
        }, 30000);
        window[cb] = function(r) {
            clearTimeout(timeout);
            delete window[cb];
            const s = document.getElementById('_hs_' + cb);
            if (s) s.remove();
            resolve(r);
        };
        const s = document.createElement('script');
        s.id = '_hs_' + cb;
        s.src = HACCP_URL + '?' + params.toString();
        s.onerror = function() {
            clearTimeout(timeout);
            delete window[cb];
            reject(new Error('Erro de rede'));
        };
        document.head.appendChild(s);
    });
}

// ========== ESTADO ==========
let currentTab = 'temperaturas';
window.todosRegistos = [];

const FALLBACKS = {
    EQUIPAMENTO: ['Vitrine','Frigorífico Cozinha','Congelador','Frigorífico Cave','Arca Vertical','Arca Carne'],
    AREA_LIMPEZA: ['Cozinha Geral','Zona de Cocção','Zona de Lavagem','Armazenamento','Instalações Sanitárias Mulheres','Instalações Sanitárias Homens','Instalações Sanitárias Colaboradores','Salão'],
    TURNO: ['Abertura','Almoço','Jantar','Fecho'],
    FUNCIONARIO: ['Luis','Lena','Leandro']
};

// ========== HELPERS UI ==========
function preencherSelect(selectId, items) {
    const select = document.getElementById(selectId);
    if (!select) return;
    select.innerHTML = '<option value="">Selecione...</option>';
    items.forEach(function(item) {
        const v = typeof item === 'object' ? item.item : item;
        const opt = document.createElement('option');
        opt.value = opt.textContent = v;
        select.appendChild(opt);
    });
}

function preencherDatalist(items) {
    let dl = document.getElementById('funcionariosList');
    if (!dl) {
        dl = document.createElement('datalist');
        dl.id = 'funcionariosList';
        document.body.appendChild(dl);
    }
    const valores = items.map(function(i) { return typeof i === 'object' ? i.item : i; });
    dl.innerHTML = valores.map(function(i) { return '<option value="' + i + '">'; }).join('');
    ['tempFuncionario','limpFuncionario','ocorFuncionario'].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) { el.setAttribute('list','funcionariosList'); el.setAttribute('autocomplete','off'); }
    });
}

function showAlert(msg, type) {
    type = type || 'success';
    const c = document.getElementById('alertContainer');
    if (!c) return;
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    c.innerHTML = '<div class="alert alert-' + type + '"><i class="fas ' + icon + '"></i> ' + msg + '</div>';
    setTimeout(function() { c.innerHTML = ''; }, 5000);
}

// ========== CARREGAR CONFIGS ==========
async function carregarConfig(tipo, selectId) {
    try {
        const data = await haccpRequest('getConfigHACCP', { tipo: tipo });
        const items = Array.isArray(data) && data.length > 0 ? data : null;
        if (items) {
            if (tipo === 'FUNCIONARIO') preencherDatalist(items);
            else preencherSelect(selectId, items);
            return true;
        }
        throw new Error('Sem itens');
    } catch(e) {
        console.warn('❌ ' + tipo + ' falhou (' + e.message + '), a usar fallback');
        const fb = FALLBACKS[tipo] || [];
        if (tipo === 'FUNCIONARIO') preencherDatalist(fb);
        else if (selectId) preencherSelect(selectId, fb);
        return false;
    }
}

async function carregarConfiguracoesDinamicas() {
    const results = await Promise.allSettled([
        carregarConfig('EQUIPAMENTO', 'tempEquipamento'),
        carregarConfig('AREA_LIMPEZA', 'limpArea'),
        carregarConfig('TURNO', 'tempTurno'),
        carregarConfig('FUNCIONARIO', null),
    ]);
    const falhou = results.filter(function(r) { return r.status === 'fulfilled' && r.value === false; }).length;
    const banner = document.getElementById('debug-banner');
    if (banner && falhou > 0) {
        banner.style.display = 'block';
        banner.innerHTML = '<strong>ℹ️ Aviso:</strong> ' + falhou + ' configuração(ões) a usar valores predefinidos. Verifica a aba <strong>HACCP-Config</strong> na Google Sheet.';
    }
}

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    const now = new Date().toTimeString().slice(0,5);
    ['tempData','limpData','ocorData'].forEach(function(id) {
        const el = document.getElementById(id); if (el) el.value = today;
    });
    ['tempHora','limpHora','ocorHora'].forEach(function(id) {
        const el = document.getElementById(id); if (el) el.value = now;
    });
    carregarConfiguracoesDinamicas();
});

// ========== TABS ==========
function switchTab(tab, btn) {
    document.querySelectorAll('[id^="tab-"]').forEach(function(el) { el.classList.add('hidden'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('tab-' + tab).classList.remove('hidden');
    if (btn) btn.classList.add('active');
    currentTab = tab;
    if (tab === 'registos') {
        document.getElementById('statsContainer').style.display = 'grid';
        carregarRegistos();
    } else {
        document.getElementById('statsContainer').style.display = 'none';
    }
}

            showAlert('❌ Erro: ' + (result.message || JSON.stringify(result)), 'danger');

    } catch(e) { showAlert('❌ Erro: ' + e.message, 'danger'); }
}

// ========== HISTÓRICO ==========
async function carregarRegistos() {
    const lista = document.getElementById('registosList');
    if (lista) lista.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Carregando registos...</div>';
    window.todosRegistos = undefined;
    try {
        const result = await haccpRequest('getDashboardHACCP');
        window.todosRegistos = result.registos || [];
        carregarFuncionariosFiltro(window.todosRegistos);
        aplicarFiltros();
    } catch(e) {
        window.todosRegistos = [];
        if (lista) lista.innerHTML = '<p style="text-align:center;padding:2rem;color:#f87171"><i class="fas fa-exclamation-circle"></i> Erro: ' + e.message + '</p>';
    }
}

function carregarFuncionariosFiltro(registos) {
    const sel = document.getElementById('filtroFuncionario');
    if (!sel) return;
    const funcs = [...new Set(registos.map(function(r) { return r.funcionario; }).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">Todos</option>';
    funcs.forEach(function(f) { const o = document.createElement('option'); o.value = o.textContent = f; sel.appendChild(o); });
}

function aplicarFiltros() {
    if (window.todosRegistos === undefined) return;
    const tipo = (document.getElementById('filtroTipo') || {}).value || '';
    const dIni = (document.getElementById('filtroDataInicio') || {}).value || '';
    const dFim = (document.getElementById('filtroDataFim') || {}).value || '';
    const func = (document.getElementById('filtroFuncionario') || {}).value || '';
    const filtrados = (window.todosRegistos || []).filter(function(r) {
        return (!tipo || r.tipo === tipo) &&
               (!dIni || r.data >= dIni) &&
               (!dFim || r.data <= dFim) &&
               (!func || r.funcionario === func);
    });
    mostrarEstatisticas(filtrados);
    const container = document.getElementById('registosList');
    if (!container) return;
    if (!filtrados.length) {
        container.innerHTML = '<p style="text-align:center;padding:2rem;color:#94a3b8"><i class="fas fa-inbox"></i> Nenhum registo encontrado</p>';
        return;
    }
    container.innerHTML = filtrados.map(function(reg) {
        return '<div class="registo-item">' +
            '<div class="registo-header">' +
            '<span class="registo-tipo">' + getTipoIcon(reg.tipo) + ' ' + formatarTipoNome(reg.tipo) + '</span>' +
            '<span class="registo-data"><i class="far fa-calendar-alt"></i> ' + formatarData(reg.data) + ' às ' + (reg.hora || '--:--') + '</span>' +
            '</div>' +
            '<div style="font-size:0.85rem;color:#cbd5e1;margin-top:0.5rem">' + getDetalhesCompletos(reg) + '</div>' +
            '</div>';
    }).join('');
}

function limparFiltros() {
    ['filtroTipo','filtroDataInicio','filtroDataFim','filtroFuncionario'].forEach(function(id) {
        const el = document.getElementById(id); if (el) el.value = '';
    });
    aplicarFiltros();
}

function mostrarEstatisticas(registos) {
    const c = document.getElementById('statsContainer');
    if (!c) return;
    if (!registos.length) { c.innerHTML = ''; c.style.display = 'none'; return; }
    c.style.display = 'grid';
    const porTipo = registos.reduce(function(acc, r) { acc[r.tipo] = (acc[r.tipo]||0)+1; return acc; }, {});
    c.innerHTML = '<div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value">' + registos.length + '</div><div class="stat-label">Total de Registos</div></div>' +
        Object.entries(porTipo).map(function(e) {
            return '<div class="stat-card"><div class="stat-icon">' + getTipoIcon(e[0]) + '</div><div class="stat-value">' + e[1] + '</div><div class="stat-label">' + formatarTipoNome(e[0]) + '</div></div>';
        }).join('');
}

function getTipoIcon(tipo) {
    return {temperaturas:'🌡️', limpeza:'🧼', ocorrencia:'⚠️'}[tipo] || '📋';
}

function formatarTipoNome(tipo) {
    return {temperaturas:'Temperatura', limpeza:'Limpeza', ocorrencia:'Ocorrência'}[tipo] || tipo;
}

function formatarData(data) {
    if (!data) return 'N/A';
    const p = String(data).split('-');
    return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : data;
}

function getDetalhesCompletos(reg) {
    let html = '<div style="display:flex;flex-direction:column;gap:0.3rem">';
    html += '<div><i class="fas fa-user" style="width:20px"></i> <strong>Funcionário:</strong> ' + (reg.funcionario || 'N/A') + '</div>';
    if (reg.tipo === 'temperaturas') {
        html += '<div><i class="fas fa-box" style="width:20px"></i> <strong>Equipamento:</strong> ' + (reg.equipamento || 'N/A') + '</div>';
        html += '<div><i class="fas fa-thermometer-half" style="width:20px"></i> <strong>Temperatura:</strong> ' + (reg.temperatura || 'N/A') + '°C</div>';
        if (reg.turno) html += '<div><i class="fas fa-chart-simple" style="width:20px"></i> <strong>Turno:</strong> ' + reg.turno + '</div>';
    } else if (reg.tipo === 'limpeza') {
        html += '<div><i class="fas fa-location-dot" style="width:20px"></i> <strong>Área:</strong> ' + (reg.equipamento || 'N/A') + '</div>';
    } else if (reg.tipo === 'ocorrencia') {
        html += '<div><i class="fas fa-align-left" style="width:20px"></i> <strong>Descrição:</strong> ' + (reg.descricao || 'N/A') + '</div>';
        if (reg.acao) html += '<div><i class="fas fa-bolt" style="width:20px"></i> <strong>Ação:</strong> ' + reg.acao + '</div>';
    }
    if (reg.observacoes) html += '<div><i class="fas fa-pen" style="width:20px"></i> <strong>Obs:</strong> ' + reg.observacoes + '</div>';
    html += '</div>';
    return html;
}
