<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACCP - Don Tasko</title>
    
    <!-- Configuração Centralizada -->
    <script src="config.js"></script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #34495e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--dark);
            transform: translateY(-2px);
        }

        .tabs {
            background: white;
            padding: 1rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: var(--light);
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #d5dbdb;
        }

        .content-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--light);
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--success);
            color: white;
        }

        .btn-primary:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--accent);
            color: white;
        }

        .registos-list {
            margin-top: 2rem;
        }

        .registo-item {
            background: var(--light);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent);
        }

        .registo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .registo-tipo {
            font-weight: 600;
            color: var(--primary);
        }

        .registo-data {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hidden {
            display: none !important;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .tabs {
                flex-direction: column;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧊 HACCP - Don Tasko</h1>
            <a href="admin.html" class="back-btn">← Voltar</a>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('temperaturas')">🌡️ Temperaturas</button>
            <button class="tab-btn" onclick="switchTab('limpeza')">🧼 Limpeza</button>
            <button class="tab-btn" onclick="switchTab('ocorrencias')">⚠️ Ocorrências</button>
            <button class="tab-btn" onclick="switchTab('registos')">📋 Registos</button>
        </div>

        <!-- Alert Messages -->
        <div id="alertContainer"></div>

        <!-- Temperaturas Tab -->
        <div id="tab-temperaturas" class="content-card">
            <h2 style="margin-bottom: 1.5rem;">Controlo de Temperaturas</h2>
            <form id="formTemperaturas" onsubmit="registarTemperatura(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Data *</label>
                        <input type="date" id="tempData" required>
                    </div>
                    <div class="form-group">
                        <label>Hora *</label>
                        <input type="time" id="tempHora" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Equipamento *</label>
                        <select id="tempEquipamento" required>
                            <option value="">Selecione...</option>
                            <option value="Frigorifico 1">Frigorifico 1</option>
                            <option value="Frigorifico 2">Frigorifico 2</option>
                            <option value="Arca Congeladora 1">Arca Congeladora 1</option>
                            <option value="Arca Congeladora 2">Arca Congeladora 2</option>
                            <option value="Câmara Fria">Câmara Fria</option>
                            <option value="Vitrine Refrigerada">Vitrine Refrigerada</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Temperatura (°C) *</label>
                        <input type="number" id="tempTemperatura" step="0.1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Turno *</label>
                        <select id="tempTurno" required>
                            <option value="">Selecione...</option>
                            <option value="Abertura">Abertura</option>
                            <option value="Almoço">Almoço</option>
                            <option value="Jantar">Jantar</option>
                            <option value="Fecho">Fecho</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Funcionário *</label>
                        <input type="text" id="tempFuncionario" required placeholder="Nome do funcionário">
                    </div>
                </div>

                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="tempObservacoes" rows="3" placeholder="Observações adicionais (opcional)"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">✅ Registar Temperatura</button>
            </form>
        </div>

        <!-- Limpeza Tab -->
        <div id="tab-limpeza" class="content-card hidden">
            <h2 style="margin-bottom: 1.5rem;">Registo de Limpeza</h2>
            <form id="formLimpeza" onsubmit="registarLimpeza(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Data *</label>
                        <input type="date" id="limpData" required>
                    </div>
                    <div class="form-group">
                        <label>Hora *</label>
                        <input type="time" id="limpHora" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Área *</label>
                        <select id="limpArea" required>
                            <option value="">Selecione...</option>
                            <option value="Cozinha Geral">Cozinha Geral</option>
                            <option value="Zona de Preparação">Zona de Preparação</option>
                            <option value="Zona de Cocção">Zona de Cocção</option>
                            <option value="Zona de Lavagem">Zona de Lavagem</option>
                            <option value="Armazenamento">Armazenamento</option>
                            <option value="Instalações Sanitárias">Instalações Sanitárias</option>
                            <option value="Salão">Salão</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Limpeza *</label>
                        <select id="limpTipo" required>
                            <option value="">Selecione...</option>
                            <option value="Limpeza Diária">Limpeza Diária</option>
                            <option value="Limpeza Profunda">Limpeza Profunda</option>
                            <option value="Desinfeção">Desinfeção</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Produtos Utilizados *</label>
                        <input type="text" id="limpProdutos" required placeholder="Ex: Desengordurante, Detergente">
                    </div>
                    <div class="form-group">
                        <label>Funcionário *</label>
                        <input type="text" id="limpFuncionario" required placeholder="Nome do funcionário">
                    </div>
                </div>

                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="limpObservacoes" rows="3" placeholder="Observações adicionais (opcional)"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">✅ Registar Limpeza</button>
            </form>
        </div>

        <!-- Ocorrências Tab -->
        <div id="tab-ocorrencias" class="content-card hidden">
            <h2 style="margin-bottom: 1.5rem;">Registo de Ocorrências</h2>
            <form id="formOcorrencia" onsubmit="registarOcorrencia(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Data *</label>
                        <input type="date" id="ocorData" required>
                    </div>
                    <div class="form-group">
                        <label>Hora *</label>
                        <input type="time" id="ocorHora" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo de Ocorrência *</label>
                        <select id="ocorTipo" required>
                            <option value="">Selecione...</option>
                            <option value="Temperatura Fora do Normal">Temperatura Fora do Normal</option>
                            <option value="Equipamento Avariado">Equipamento Avariado</option>
                            <option value="Produto Não Conforme">Produto Não Conforme</option>
                            <option value="Contaminação">Contaminação</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Funcionário *</label>
                        <input type="text" id="ocorFuncionario" required placeholder="Nome do funcionário">
                    </div>
                </div>

                <div class="form-group">
                    <label>Descrição da Ocorrência *</label>
                    <textarea id="ocorDescricao" rows="3" required placeholder="Descreva o que aconteceu"></textarea>
                </div>

                <div class="form-group">
                    <label>Ação Imediata Tomada *</label>
                    <textarea id="ocorAcao" rows="3" required placeholder="Que medidas foram tomadas?"></textarea>
                </div>

                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="ocorObservacoes" rows="2" placeholder="Observações adicionais (opcional)"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">✅ Registar Ocorrência</button>
            </form>
        </div>

        <!-- Registos Tab -->
        <div id="tab-registos" class="content-card hidden">
            <h2 style="margin-bottom: 1.5rem;">Histórico de Registos</h2>
            
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <button onclick="carregarRegistos()" class="btn btn-secondary">🔄 Atualizar</button>
                <button onclick="exportarPDF()" class="btn btn-secondary">📄 Exportar PDF</button>
            </div>

            <div id="registosList" class="registos-list">
                <div class="loading">Carregando registos...</div>
            </div>
        </div>
    </div>

    <script>
        // URL_SCRIPT vem do config.js

        let currentTab = 'temperaturas';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setDefaultDates();
        });

        function setDefaultDates() {
            const today = new Date().toISOString().split('T')[0];
            const now = new Date().toTimeString().slice(0, 5);
            
            document.getElementById('tempData').value = today;
            document.getElementById('tempHora').value = now;
            document.getElementById('limpData').value = today;
            document.getElementById('limpHora').value = now;
            document.getElementById('ocorData').value = today;
            document.getElementById('ocorHora').value = now;
        }

        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            
            // Remove active from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Show selected tab
            document.getElementById('tab-' + tab).classList.remove('hidden');
            event.target.classList.add('active');
            
            currentTab = tab;
            
            // Load registos if that tab is selected
            if (tab === 'registos') {
                carregarRegistos();
            }
        }

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        async function registarTemperatura(event) {
            event.preventDefault();
            
            const dados = {
                tipo: 'temperaturas',
                data: document.getElementById('tempData').value,
                hora: document.getElementById('tempHora').value,
                timestamp: new Date().toISOString(),
                equipamento: document.getElementById('tempEquipamento').value,
                temperatura: document.getElementById('tempTemperatura').value,
                turno: document.getElementById('tempTurno').value,
                funcionario: document.getElementById('tempFuncionario').value,
                observacoes: document.getElementById('tempObservacoes').value
            };
            
            try {
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'registarHACCP',
                        dados: dados
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showAlert('✅ Temperatura registada com sucesso!', 'success');
                    document.getElementById('formTemperaturas').reset();
                    setDefaultDates();
                } else {
                    showAlert('❌ Erro: ' + result.message, 'danger');
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('❌ Erro ao registar temperatura', 'danger');
            }
        }

        async function registarLimpeza(event) {
            event.preventDefault();
            
            const dados = {
                tipo: 'limpeza',
                data: document.getElementById('limpData').value,
                hora: document.getElementById('limpHora').value,
                timestamp: new Date().toISOString(),
                area: document.getElementById('limpArea').value,
                tipo: document.getElementById('limpTipo').value,
                produtos: document.getElementById('limpProdutos').value,
                funcionario: document.getElementById('limpFuncionario').value,
                observacoes: document.getElementById('limpObservacoes').value
            };
            
            try {
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'registarHACCP',
                        dados: dados
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showAlert('✅ Limpeza registada com sucesso!', 'success');
                    document.getElementById('formLimpeza').reset();
                    setDefaultDates();
                } else {
                    showAlert('❌ Erro: ' + result.message, 'danger');
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('❌ Erro ao registar limpeza', 'danger');
            }
        }

        async function registarOcorrencia(event) {
            event.preventDefault();
            
            const dados = {
                tipo: 'ocorrencia',
                data: document.getElementById('ocorData').value,
                hora: document.getElementById('ocorHora').value,
                timestamp: new Date().toISOString(),
                tipo: document.getElementById('ocorTipo').value,
                funcionario: document.getElementById('ocorFuncionario').value,
                descricao: document.getElementById('ocorDescricao').value,
                acao: document.getElementById('ocorAcao').value,
                observacoes: document.getElementById('ocorObservacoes').value
            };
            
            try {
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'registarHACCP',
                        dados: dados
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showAlert('✅ Ocorrência registada com sucesso!', 'success');
                    document.getElementById('formOcorrencia').reset();
                    setDefaultDates();
                } else {
                    showAlert('❌ Erro: ' + result.message, 'danger');
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('❌ Erro ao registar ocorrência', 'danger');
            }
        }

        async function carregarRegistos() {
            const container = document.getElementById('registosList');
            container.innerHTML = '<div class="loading">Carregando registos...</div>';
            
            try {
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getDashboardHACCP' })
                });
                
                const result = await response.json();
                
                if (result.status === 'success' && result.registos) {
                    if (result.registos.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: #7f8c8d;">Nenhum registo encontrado</p>';
                        return;
                    }
                    
                    let html = '';
                    result.registos.forEach(reg => {
                        html += `
                            <div class="registo-item">
                                <div class="registo-header">
                                    <span class="registo-tipo">${getTipoIcon(reg.tipo)} ${reg.tipo}</span>
                                    <span class="registo-data">${reg.data} ${reg.hora}</span>
                                </div>
                                <div style="font-size: 0.9rem; color: #555;">
                                    <strong>Funcionário:</strong> ${reg.funcionario}<br>
                                    ${getDetalhes(reg)}
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #e74c3c;">Erro ao carregar registos</p>';
                }
            } catch (error) {
                console.error('Erro:', error);
                container.innerHTML = '<p style="text-align: center; color: #e74c3c;">Erro ao carregar registos</p>';
            }
        }

        function getTipoIcon(tipo) {
            const icons = {
                'temperaturas': '🌡️',
                'limpeza': '🧼',
                'ocorrencia': '⚠️',
                'checklist': '✅',
                'oleo': '🍟',
                'rececao': '📦'
            };
            return icons[tipo] || '📋';
        }

        function getDetalhes(reg) {
            if (reg.tipo === 'temperaturas') {
                return `<strong>Equipamento:</strong> ${reg.equipamento || 'N/A'} | <strong>Temperatura:</strong> ${reg.temperatura}°C`;
            } else if (reg.tipo === 'limpeza') {
                return `<strong>Área:</strong> ${reg.area || 'N/A'}`;
            } else if (reg.tipo === 'ocorrencia') {
                return `<strong>Descrição:</strong> ${reg.descricao || 'N/A'}`;
            }
            return reg.observacoes || '';
        }

        async function exportarPDF() {
            showAlert('⏳ A gerar PDF...', 'success');
            
            try {
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'gerarPDFHACCP',
                        filtros: {}
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    window.open(result.pdfUrl, '_blank');
                    showAlert('✅ PDF gerado! Abrindo em nova janela...', 'success');
                } else {
                    showAlert('❌ Erro ao gerar PDF: ' + result.message, 'danger');
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('❌ Erro ao gerar PDF', 'danger');
            }
        }
    </script>
</body>
</html>
