<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas | Don Tasko</title>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #2c3e50; font-size: 14px; }
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 5px;
            border: 2px solid #ecf0f1; border-radius: 10px;
            font-size: 16px; transition: all 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #3498db; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        button {
            width: 100%; padding: 14px; margin-top: 25px;
            background: #27ae60; color: white;
            border: none; border-radius: 10px;
            font-size: 18px; font-weight: bold;
            cursor: pointer; transition: all 0.3s;
        }
        button:hover { background: #219a52; transform: translateY(-2px); }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .btn-whatsapp { background: #25D366; }
        .btn-whatsapp:hover { background: #1da851; }
        .alert {
            padding: 12px; border-radius: 10px; margin-bottom: 20px;
            display: none; font-size: 14px;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .fechado { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 10px; margin-top: 10px; display: none; }
        .checkbox { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .checkbox input { width: auto; margin: 0; }
        .checkbox label { margin: 0; font-weight: normal; font-size: 13px; }
        .loading { text-align: center; padding: 20px; color: #3498db; }
        @media (max-width: 500px) {
            .container { padding: 20px; }
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🍽️ Don Tasko</h1>
    <div class="subtitle">Reserva de Mesa</div>

    <div id="alert" class="alert"></div>
    <div id="loading" class="loading">⏳ A carregar...</div>

    <div id="form" style="display: none;">
        <label>📝 Nome Completo *</label>
        <input type="text" id="nome" placeholder="Ex: João Silva" required>

        <label>📱 Telemóvel *</label>
        <input type="tel" id="telefone" placeholder="925504212" required>

        <label>📧 E-mail</label>
        <input type="email" id="email" placeholder="exemplo@email.com">

        <div class="row">
            <div>
                <label>📅 Data *</label>
                <input type="date" id="data" required>
                <div id="fechadoMsg" class="fechado">❌ Restaurante fechado neste dia</div>
            </div>
            <div>
                <label>👥 Pessoas *</label>
                <input type="number" id="pax" min="1" max="20" value="2" required>
            </div>
        </div>

        <label>⏰ Horário *</label>
        <select id="horario" required>
            <option value="">Selecione uma data primeiro</option>
        </select>
        <div id="dispMsg" class="alert-warning" style="margin-top: 10px; display: none;"></div>

        <label>📝 Observações</label>
        <textarea id="obs" rows="3" placeholder="Alergias, preferências, etc."></textarea>

        <div class="checkbox">
            <input type="checkbox" id="consent" required>
            <label>Aceito a <a href="#" onclick="alert('Política de Privacidade')">Política de Privacidade</a> *</label>
        </div>
        <div id="consentError" style="color: #e74c3c; font-size: 12px; display: none;">É necessário aceitar a política</div>

        <button type="submit" id="btn">Confirmar Reserva</button>
    </div>
</div>

<script>
let configs = {};
let diasFechados = [];
let horarios = {};

const dataInput = document.getElementById('data');
const horarioSelect = document.getElementById('horario');
const paxInput = document.getElementById('pax');
const btn = document.getElementById('btn');
const alertDiv = document.getElementById('alert');
const fechadoMsg = document.getElementById('fechadoMsg');
const dispMsg = document.getElementById('dispMsg');
const loadingDiv = document.getElementById('loading');
const formDiv = document.getElementById('form');

function showAlert(msg, type) {
    alertDiv.className = `alert alert-${type}`;
    alertDiv.innerHTML = msg;
    alertDiv.style.display = 'block';
    setTimeout(() => alertDiv.style.display = 'none', 5000);
}

async function apiRequest(action, data = {}) {
    const response = await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...data })
    });
    return await response.json();
}

function gerarHorarios(almoco, jantar) {
    horarioSelect.innerHTML = '<option value="">Selecione um horário</option>';
    
    function addSlots(inicio, fim, turno) {
        let [h1, m1] = inicio.split(':').map(Number);
        let [h2, m2] = fim.split(':').map(Number);
        let minutos = h1 * 60 + m1;
        let fimMin = h2 * 60 + m2;
        while (minutos <= fimMin) {
            let hora = Math.floor(minutos / 60);
            let minuto = minutos % 60;
            let time = `${hora.toString().padStart(2,'0')}:${minuto.toString().padStart(2,'0')}`;
            let opt = document.createElement('option');
            opt.value = time;
            opt.text = `${time} (${turno})`;
            horarioSelect.appendChild(opt);
            minutos += 30;
        }
    }
    
    if (almoco && almoco.includes('-')) {
        let [inicio, fim] = almoco.split('-');
        addSlots(inicio.trim(), fim.trim(), 'Almoço');
    }
    if (jantar && jantar.includes('-')) {
        let [inicio, fim] = jantar.split('-');
        addSlots(inicio.trim(), fim.trim(), 'Jantar');
    }
}

async function verificarDisponibilidade() {
    const data = dataInput.value;
    const hora = horarioSelect.value;
    const pax = parseInt(paxInput.value);
    
    if (!data || !hora || !pax || pax > (configs.MAX_CONVIDADOS || 6)) {
        dispMsg.style.display = 'none';
        btn.disabled = false;
        return;
    }
    
    try {
        const result = await apiRequest('verificarDisponiblidade', { data, pax, horario: hora });
        if (result.disponivel === false) {
            dispMsg.innerHTML = '⚠️ Sem disponibilidade para este horário';
            dispMsg.style.display = 'block';
            btn.disabled = true;
        } else {
            dispMsg.style.display = 'none';
            btn.disabled = false;
        }
    } catch(e) {
        dispMsg.style.display = 'none';
        btn.disabled = false;
    }
}

function verificarData() {
    const data = dataInput.value;
    
    if (!data) {
        horarioSelect.innerHTML = '<option value="">Selecione uma data</option>';
        horarioSelect.disabled = true;
        fechadoMsg.style.display = 'none';
        return;
    }
    
    if (diasFechados.includes(data)) {
        fechadoMsg.style.display = 'block';
        horarioSelect.innerHTML = '<option value="">Encerrado</option>';
        horarioSelect.disabled = true;
        return;
    }
    
    fechadoMsg.style.display = 'none';
    horarioSelect.disabled = false;
    gerarHorarios(horarios.almoco, horarios.jantar);
    verificarDisponibilidade();
}

function verificarGrupo() {
    const pax = parseInt(paxInput.value);
    const max = configs.MAX_CONVIDADOS || 6;
    
    if (pax > max) {
        btn.innerHTML = `📱 WhatsApp (Grupo > ${max})`;
        btn.classList.add('btn-whatsapp');
        btn.onclick = (e) => {
            e.preventDefault();
            const data = dataInput.value ? new Date(dataInput.value).toLocaleDateString('pt-PT') : '';
            const hora = horarioSelect.value;
            const msg = `Reserva: ${pax} pessoas${data ? ' em ' + data : ''}${hora ? ' às ' + hora : ''}`;
            window.open(`https://wa.me/351${configs.TELEFONE_RESTAURANTE || '925504212'}?text=${encodeURIComponent(msg)}`, '_blank');
        };
        btn.type = 'button';
        btn.disabled = false;
    } else {
        btn.innerHTML = 'Confirmar Reserva';
        btn.classList.remove('btn-whatsapp');
        btn.onclick = null;
        btn.type = 'submit';
        verificarDisponibilidade();
    }
}

async function carregarDados() {
    try {
        const [fechados, hors, configsData] = await Promise.all([
            apiRequest('getDiasFechados'),
            apiRequest('getHorarios'),
            apiRequest('getConfigs')
        ]);
        
        diasFechados = fechados || [];
        horarios = hors || { almoco: "12:00-14:15", jantar: "19:30-20:30" };
        configs = configsData || {};
        
        loadingDiv.style.display = 'none';
        formDiv.style.display = 'block';
        
        const hoje = new Date().toISOString().split('T')[0];
        dataInput.min = hoje;
        
        dataInput.addEventListener('change', () => {
            verificarData();
            verificarGrupo();
        });
        paxInput.addEventListener('input', () => {
            verificarGrupo();
            verificarDisponibilidade();
        });
        horarioSelect.addEventListener('change', verificarDisponibilidade);
        
    } catch(e) {
        loadingDiv.innerHTML = '❌ Erro ao carregar. Recarregue a página.';
        console.error(e);
    }
}

document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    if (!document.getElementById('consent').checked) {
        document.getElementById('consentError').style.display = 'block';
        return;
    }
    document.getElementById('consentError').style.display = 'none';
    
    const pax = parseInt(paxInput.value);
    const max = configs.MAX_CONVIDADOS || 6;
    if (pax > max) return;
    
    btn.disabled = true;
    btn.innerHTML = 'A processar...';
    
    const dados = {
        nome: document.getElementById('nome').value,
        telemovel: document.getElementById('telefone').value.replace(/\D/g, ''),
        email: document.getElementById('email').value,
        data: dataInput.value,
        horario: horarioSelect.value,
        pax: pax,
        obs: document.getElementById('obs').value
    };
    
    try {
        const res = await apiRequest('reservaSite', dados);
        if (res.status === 'success') {
            formDiv.style.display = 'none';
            showAlert('✅ Reserva confirmada! Receberá confirmação por email.', 'success');
        } else {
            throw new Error(res.message);
        }
    } catch(e) {
        showAlert('❌ Erro: ' + e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Confirmar Reserva';
    }
});

document.getElementById('telefone').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 9);
});

carregarDados();
</script>
</body>
</html>
