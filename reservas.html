<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reservas | Don Tasko</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Banner de Manutenção */
        .maintenance-banner {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            text-align: center;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; }
        }

        .maintenance-banner h2 {
            font-size: 1.3rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .maintenance-banner p {
            font-size: 0.9rem;
            opacity: 0.95;
        }

        /* Card de Reservas (desfocado/desabilitado) */
        .booking-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            filter: blur(3px);
            pointer-events: none;
            opacity: 0.7;
        }

        /* Overlay de bloqueio */
        .blocked-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            z-index: 10;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            color: #2c3e50;
            font-size: 1.8rem;
        }

        .logo p {
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.85rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 0.95rem;
            background: #f9f9f9;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row > div {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background: #bdc3c7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
        }

        @media (max-width: 550px) {
            .row {
                flex-direction: column;
                gap: 0;
            }
            .booking-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    
    <!-- BANNER DE MANUTENÇÃO -->
    <div class="maintenance-banner">
        <h2>
            🔧 EM MANUTENÇÃO 🔧
        </h2>
        <p>
            Estamos a melhorar o nosso sistema de reservas para lhe oferecer a melhor experiência.
        </p>
        <p style="margin-top: 8px; font-weight: bold;">
            ⭐ Prometemos ser breves! ⭐
        </p>
    </div>

    <!-- FORMULÁRIO DE RESERVAS (DESATIVADO) -->
    <div class="booking-card">
        <div class="blocked-overlay"></div>
        <div class="logo">
            <h1>🍽️ Don Tasko</h1>
            <p>Reserva de Mesa</p>
        </div>

        <form id="formReserva">
            <label>📝 Nome Completo</label>
            <input type="text" placeholder="Ex: João Silva" disabled>

            <label>📱 Telemóvel</label>
            <input type="tel" placeholder="925504212" disabled>

            <label>📧 E-mail</label>
            <input type="email" placeholder="exemplo@email.com" disabled>

            <div class="row">
                <div>
                    <label>📅 Data</label>
                    <input type="date" disabled>
                </div>
                <div>
                    <label>👥 Pessoas</label>
                    <input type="number" value="2" disabled>
                </div>
            </div>

            <label>⏰ Horário</label>
            <select disabled>
                <option>19:30</option>
                <option>20:00</option>
                <option>20:30</option>
            </select>

            <label>📝 Observações</label>
            <textarea rows="3" placeholder="Alergias, preferências..." disabled></textarea>

            <button disabled>⏳ Reservas temporariamente indisponíveis</button>
        </form>
    </div>
    
    <div class="footer">
        Don Tasko - Gastronomia & Tradição
    </div>
</div>
</body>
</html>
