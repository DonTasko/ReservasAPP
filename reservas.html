<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - Don Tasko</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  
  <style>
    :root {
      --primary: #2c3e50;
      --secondary: #e74c3c;
      --success: #27ae60;
      --info: #3498db;
      --warning: #f39c12;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px 0;
    }
    
    .container {
      max-width: 600px;
    }
    
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .card-header {
      background: linear-gradient(135deg, var(--primary) 0%, #34495e 100%);
      color: white;
      border-radius: 15px 15px 0 0 !important;
      padding: 20px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--secondary) 0%, #c0392b 100%);
      border: none;
      padding: 12px 30px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
    }
    
    .form-control, .form-select {
      border-radius: 8px;
      border: 2px solid #e0e0e0;
      padding: 12px;
      transition: all 0.3s;
    }
    
    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem rgba(44, 62, 80, 0.25);
    }
    
    .alert {
      border-radius: 10px;
      border: none;
    }
    
    #loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    
    .spinner-border {
      width: 3rem;
      height: 3rem;
    }
  </style>
  
  <!-- CRÍTICO: Config.js PRIMEIRO -->
  <script src="config.js"></script>
  
  <script>
    console.log('✅ CONFIG carregado:', CONFIG);
  </script>
</head>
<body>
<div class="booking-card">
    <div class="logo">
        <img src="logo.png" alt="Don Tasko" onerror="this.style.display='none'">
        <h1>Don Tasko</h1>
        <p>Reserva de Mesa</p>
    </div>

    <div id="msg-sucesso">✅ Reserva enviada com sucesso! Vais receber confirmação em breve.</div>
    <div id="msg-erro"></div>

    <form id="formReserva">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" placeholder="O teu nome completo" required minlength="2">

        <label for="telefone">Telemóvel</label>
        <input type="tel" id="telefone" name="telemovel" placeholder="Ex: 925504212" required pattern="[0-9]{9}" title="Digite 9 dígitos">

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="o teu e-mail">

        <div class="form-row">
            <div>
                <label for="dataReserva">Data</label>
                <input type="date" id="dataReserva" name="data" required>
                <div id="avisoFechado" class="aviso-fechado">
                    ⚠️ Nesse dia estamos encerrados. Escolhe outra data.
                </div>
            </div>
            <div>
                <label for="numPax">Pessoas</label>
                <input type="number" id="numPax" name="pax" min="1" max="20" value="2" required>
            </div>
        </div>

        <label for="selectHorario">Horário</label>
        <select id="selectHorario" name="horario" required>
            <option value="">Seleciona um horário</option>
        </select>
        <div id="avisoDisponibilidade" class="aviso-disponibilidade"></div>

        <label for="obs">Observações (opcional)</label>
        <textarea id="obs" name="obs" rows="3" placeholder="Alergias, preferências, etc. (opcional)"></textarea>

        <div class="consent-box">
            <div class="checkbox-wrapper">
                <input type="checkbox" id="consentData" required>
                <label for="consentData">
                    Li e aceito a <a href="politica-privacidade.html" target="_blank">Política de Privacidade</a> e autorizo o tratamento dos meus dados pessoais para processamento da reserva. *
                </label>
            </div>
            <div class="checkbox-wrapper">
                <input type="checkbox" id="consentMarketing">
                <label for="consentMarketing">
                    Desejo receber comunicações de marketing e newsletter do Don Tasko (opcional)
                </label>
            </div>
            <div id="consentError" class="consent-error">
                Tens de aceitar a Política de Privacidade para continuar.
            </div>
        </div>

        <button type="submit" class="btn-submit" id="btnEnviar">Confirmar Reserva</button>
    </form>
</div>

<script>
console.log('🚀 Reservas Don Tasko iniciando...');

const campoData = document.getElementById('dataReserva');
const selectHorario = document.getElementById('selectHorario');
const campoPax = document.getElementById('numPax');
const campoTelemovel = document.getElementById('telefone');
const btnEnviar = document.getElementById('btnEnviar');
const avisoDisp = document.getElementById('avisoDisponibilidade');
const avisoFechado = document.getElementById('avisoFechado');
const msgErro = document.getElementById('msg-erro');
const consentData = document.getElementById('consentData');
const consentError = document.getElementById('consentError');

let configsGlobal = {};
let diasFechados = [];
let horarios = {};

async function carregarDados() {
    try {
        console.log('🔄 Carregando configurações...');
        
        const [fechados, hors, configs] = await Promise.all([
            apiRequest('getDiasFechados', {}, CONFIG.SCRIPT_RESERVAS),
            apiRequest('getHorarios', {}, CONFIG.SCRIPT_RESERVAS),
            apiRequest('getConfigs', {}, CONFIG.SCRIPT_RESERVAS)
        ]);

        configsGlobal = configs || {};
        diasFechados = Array.isArray(fechados) ? fechados : [];
        horarios = hors || {};

        console.log('✅ Configurações carregadas:');
        console.log('  Dias fechados:', diasFechados);
        console.log('  Horários:', horarios);
        console.log('  Configs:', configsGlobal);

        // Definir data mínima (hoje)
        const hoje = new Date();
        campoData.min = hoje.toISOString().split('T')[0];

        // Event listeners
        campoData.addEventListener('change', verificarDataEGerarHoras);
        campoPax.addEventListener('input', verificarGrupoEDisponibilidade);
        selectHorario.addEventListener('change', verificarDisponibilidadeHorario);
        consentData.addEventListener('change', () => {
            if (consentData.checked) consentError.style.display = 'none';
        });

        verificarDataEGerarHoras();
    } catch (e) {
        console.error('❌ Erro ao carregar dados:', e);
        mostrarErro('Erro ao carregar configurações. Tenta novamente mais tarde.');
    }
}

function verificarDataEGerarHoras() {
    const dataValue = campoData.value;
    avisoFechado.style.display = 'none';

    if (!dataValue) {
        selectHorario.innerHTML = '<option value="">Seleciona uma data primeiro</option>';
        avisoDisp.style.display = 'none';
        return;
    }

    const data = new Date(dataValue + 'T00:00:00');
    const diaSemana = data.toLocaleDateString('pt-PT', { weekday: 'long' }).toLowerCase();

    // Verificar se está fechado
    if (diasFechados.includes(diaSemana) || diasFechados.includes(dataValue)) {
        avisoFechado.style.display = 'block';
        selectHorario.innerHTML = '<option value="">Encerrado</option>';
        selectHorario.disabled = true;
        avisoDisp.style.display = 'none';
        return;
    }

    selectHorario.disabled = false;
    gerarHoras(horarios);
    verificarDisponibilidadeHorario();
}

function verificarGrupoEDisponibilidade() {
    verificarGrupo();
    verificarDisponibilidadeHorario();
}

function verificarGrupo() {
    const max = parseInt(configsGlobal.MAX_CONVIDADOS) || 8;
    const pax = parseInt(campoPax.value);

    if (pax > max) {
        btnEnviar.innerText = `Reservar via WhatsApp (Grupo > ${max})`;
        btnEnviar.classList.add('btn-whatsapp');
        btnEnviar.type = 'button';
        btnEnviar.onclick = abrirWhatsApp;
    } else {
        btnEnviar.innerText = 'Confirmar Reserva';
        btnEnviar.classList.remove('btn-whatsapp');
        btnEnviar.type = 'submit';
        btnEnviar.onclick = null;
    }
}

function abrirWhatsApp(e) {
    e.preventDefault();
    const pax = parseInt(campoPax.value);
    const data = campoData.value ? new Date(campoData.value + 'T00:00:00').toLocaleDateString('pt-PT') : '';
    const hora = selectHorario.value || '';

    const tel = configsGlobal.TELEFONE_RESTAURANTE || '925504212';

    const mensagem = `Olá! Queria reservar mesa para ${pax} pessoas${data ? ' em ' + data : ''}${hora ? ' pelas ' + hora : ''}.`;
    window.open(`https://wa.me/351${tel}?text=${encodeURIComponent(mensagem)}`, '_blank');
}

function gerarHoras(h) {
    console.log('🕐 gerarHoras chamado com:', h);
    selectHorario.innerHTML = '<option value="">Seleciona um horário</option>';

    if (!h) {
        console.error('❌ Horários não definidos');
        return;
    }

    // Estrutura nova com .slots
    if (h.almoco && h.almoco.slots) {
        console.log('✅ Usando estrutura nova (slots)');
        
        h.almoco.slots.forEach(slot => {
            const opt = document.createElement('option');
            opt.value = opt.text = slot;
            selectHorario.appendChild(opt);
        });

        if (h.jantar && h.jantar.slots) {
            h.jantar.slots.forEach(slot => {
                const opt = document.createElement('option');
                opt.value = opt.text = slot;
                selectHorario.appendChild(opt);
            });
        }
    } else {
        // Estrutura antiga com intervalos
        console.log('⚠️ Usando estrutura antiga (intervalos)');
        
        [h.almoco, h.jantar].forEach(intervalo => {
            if (!intervalo || typeof intervalo !== 'string') return;

            const parts = intervalo.replace(/–|—/g, '-').split('-');
            if (parts.length < 2) return;

            let [hAt, mAt] = parts[0].trim().split(':').map(Number);
            const [hFim, mFim] = parts[1].trim().split(':').map(Number);

            while (hAt < hFim || (hAt === hFim && mAt <= mFim)) {
                const tempo = `${String(hAt).padStart(2,'0')}:${String(mAt).padStart(2,'0')}`;
                const opt = document.createElement('option');
                opt.value = opt.text = tempo;
                selectHorario.appendChild(opt);
                mAt += 15;
                if (mAt >= 60) {
                    mAt = 0;
                    hAt++;
                }
            }
        });
    }

    console.log(`✅ Horários gerados: ${selectHorario.options.length - 1} opções`);
}

async function verificarDisponibilidadeHorario() {
    if (!campoData.value || !selectHorario.value) {
        avisoDisp.style.display = 'none';
        return;
    }

    try {
        const resultado = await apiRequest('verificarDisponiblidade', {
            data: campoData.value,
            pax: parseInt(campoPax.value),
            horario: selectHorario.value
        }, CONFIG.SCRIPT_RESERVAS);

        if (!resultado.disponivel) {
            avisoDisp.textContent = '⚠️ Sem disponibilidade para este horário. Escolhe outro.';
            avisoDisp.classList.add('indisponivel');
            selectHorario.style.borderColor = '#e74c3c';
            btnEnviar.disabled = true;
        } else {
            avisoDisp.classList.remove('indisponivel');
            selectHorario.style.borderColor = '';
            btnEnviar.disabled = false;
        }

        avisoDisp.style.display = resultado.disponivel ? 'none' : 'block';
    } catch (error) {
        console.error('❌ Erro ao verificar disponibilidade:', error);
        avisoDisp.style.display = 'none';
    }
}

function mostrarErro(mensagem) {
    msgErro.textContent = '❌ ' + mensagem;
    msgErro.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    setTimeout(() => {
        msgErro.style.display = 'none';
    }, 8000);
}

// Submit do formulário
document.getElementById('formReserva').addEventListener('submit', async (e) => {
    e.preventDefault();

    // Validar consentimento
    if (!consentData.checked) {
        consentError.style.display = 'block';
        consentData.focus();
        window.scrollTo({
            top: consentData.offsetTop - 100,
            behavior: 'smooth'
        });
        return;
    }

    // Validar grupo
    const max = parseInt(configsGlobal.MAX_CONVIDADOS) || 6;
    if (parseInt(campoPax.value) > max) {
        mostrarErro(`Grupo muito grande (máx ${max} pessoas). Utilize o WhatsApp.`);
        return;
    }

    // Validar campos obrigatórios
    if (!campoData.value || !selectHorario.value) {
        mostrarErro('Por favor, preenche todos os campos obrigatórios.');
        return;
    }

    btnEnviar.disabled = true;
    btnEnviar.innerText = 'A processar...';
    document.getElementById('formReserva').classList.add('carregando');

    try {
        // Preparar dados
        const formData = new FormData(e.target);
        const dados = Object.fromEntries(formData);
        
        // Garantir que o telemóvel está no formato correto
        dados.telemovel = dados.telemovel.replace(/\D/g, '');
        
        console.log('📤 DADOS A ENVIAR:', dados);

        // Enviar reserva
        const res = await apiRequest('reservaSite', dados, CONFIG.SCRIPT_RESERVAS);

        console.log('📥 RESPOSTA:', res);

        if (res.status === 'success') {
            document.getElementById('formReserva').style.display = 'none';
            document.getElementById('msg-sucesso').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            throw new Error(res.message || 'Erro desconhecido ao processar reserva');
        }
    } catch (error) {
        console.error('❌ Erro:', error);
        mostrarErro(error.message || 'Erro ao processar reserva. Verifica a conexão e tenta novamente.');
        btnEnviar.disabled = false;
        btnEnviar.innerText = 'Confirmar Reserva';
        document.getElementById('formReserva').classList.remove('carregando');
    }
});

// Validação de telemóvel em tempo real
campoTelemovel.addEventListener('input', function() {
    // Remove tudo que não é dígito
    this.value = this.value.replace(/\D/g, '');
    
    // Limita a 9 dígitos
    if (this.value.length > 9) {
        this.value = this.value.slice(0, 9);
    }
});

// Iniciar
carregarDados();
</script>

<!-- Cookie Banner Script -->
<script src="cookie-banner.js"></script>
</body>
</html>
